<div class="pos-container">

    <!-- PRODUCTOS -->
    <div class="pos-productos">
        <h2> <i class="fas fa-utensils"></i> Productos</h2>
        <div id="productosPOS" class="productos-grid"></div>
    </div>

    <!-- TICKET -->
    <div class="pos-ticket">

        <h2> <i class="fas fa-receipt"></i> Venta Actual</h2>

        <div id="ticketItems" class="ticket-items"></div>

        <div class="ticket-resumen">
            <div>
                <span> <i class="fas fa-list"></i> Subtotal:</span>
                <span id="subtotalPOS">RD$ 0.00</span>
            </div>

            <div class="total-line">
                <span> <i class="fas fa-money-bill"></i> TOTAL:</span>
                <span id="totalPOS">RD$ 0.00</span>
            </div>
        </div>

        <button class="btn-cobrar" onclick="cobrarVenta()">
             <i class="fas fa-money-bill"></i> COBRAR
        </button>

    </div>

</div>
